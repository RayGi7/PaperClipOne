name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test ──────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

  # ── Build check ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          # Placeholder env vars for build — real values set in Vercel dashboard
          GOOGLE_SERVICE_ACCOUNT_EMAIL: build-placeholder@example.com
          GOOGLE_PRIVATE_KEY: placeholder
          GOOGLE_CALENDAR_ID: placeholder
          EMAIL_FROM: build@example.com
          EMAIL_APP_PASSWORD: placeholder
          DJ_EMAIL: dj@example.com
          DB_PATH: /tmp/bookings.db
          ADMIN_API_KEY: placeholder
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: placeholder

  # ── Deploy to Vercel (main branch only) ──────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
